interface:
  display_name: "Review-Driven Development"
  short_description: "Plan, critique, TODO, implement, validate, document, and improve with critical-only subagents."
  default_prompt: "$review-driven-development Analyze this requirement, create TODOs, implement one TODO at a time with TDD validation, document completed work, and update TODOs after critical review."
policy:
  allow_implicit_invocation: true

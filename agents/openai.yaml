interface:
  display_name: "Review-Driven Development"
  short_description: "Plan, critique, TODO, validate, document, and persist project structure/completeness context."
  default_prompt: "$review-driven-development Analyze this requirement, refresh project structure/completeness context, create TODOs, implement one TODO at a time with TDD validation, document completed work, and update TODOs after critical review."
policy:
  allow_implicit_invocation: true

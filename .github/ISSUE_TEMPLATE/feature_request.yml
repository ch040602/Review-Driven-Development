name: Feature request
description: Propose a new feature or workflow improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the new behavior, API, or workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - README/docs
        - Skill workflow
        - Helper script
        - Tests/validation
        - GitHub configuration
        - External skill registry
    validations:
      required: true

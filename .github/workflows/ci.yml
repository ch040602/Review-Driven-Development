name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate skill and smoke workflow
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install -U pip
          python -m pip install pytest

      - name: Compile helper scripts
        run: python -m compileall -q -f skills/review-driven-development/scripts

      - name: Validate skill layout
        run: python skills/review-driven-development/scripts/validate_skill.py --skill-dir skills/review-driven-development

      - name: Validate registration helper
        run: python skills/review-driven-development/scripts/skill_registration.py --repo-root . --validate-only

      - name: Run self-test
        run: python skills/review-driven-development/scripts/self_test.py

      - name: Run pytest smoke tests
        run: pytest -q
